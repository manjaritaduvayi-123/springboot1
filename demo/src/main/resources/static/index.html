<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpringBoot UI</title>

    <style>

        body{
            margin:0;
            font-family:Arial, Helvetica, sans-serif;
            background:#f4f4f4;
        }

        /* NAVBAR */

        .navbar{
            background:black;
            padding:15px 40px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .logo{
            color:white;
            font-size:24px;
            font-weight:bold;
        }

        .menu{
            display:flex;
            gap:25px;
        }

        .menu a{
            color:white;
            text-decoration:none;
            font-size:18px;
        }

        .menu a:hover{
            color:orange;
        }

        /* HERO SECTION */

        .hero{
            text-align:center;
            padding:80px 20px;
        }

        .hero h1{
            font-size:50px;
            color:#333;
        }

        .hero p{
            font-size:20px;
            color:gray;
        }

        /* USER CARD */

        .card-container{
            display:flex;
            justify-content:center;
            margin-top:40px;
        }

        .card{
            width:300px;
            background:white;
            padding:20px;
            border-radius:12px;
            box-shadow:0px 4px 10px rgba(0,0,0,0.2);
            text-align:center;
        }

        .card img{
            width:120px;
            height:120px;
            border-radius:50%;
        }

        .card h2{
            margin-top:15px;
        }

        .card p{
            color:gray;
        }

        /* BUTTON */

        .toggle-btn{
            margin-top:20px;
            padding:12px 20px;
            border:none;
            background:black;
            color:white;
            font-size:16px;
            border-radius:8px;
            cursor:pointer;
        }

        .toggle-btn:hover{
            background:orange;
        }

        /* DARK MODE */

        .dark{
            background:#111;
            color:white;
        }

        .dark .hero h1{
            color:white;
        }

        .dark .card{
            background:#222;
            color:white;
        }

    </style>
</head>

<body id="body">

    <!-- NAVBAR -->

    <div class="navbar">

        <div class="logo">
            SpringBoot UI
        </div>

        <div class="menu">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </div>

    </div>

    <!-- HERO SECTION -->

    <div class="hero">

        <h1>Welcome to Spring Boot</h1>

        <p>Frontend + Backend Learning Project</p>

        <button class="toggle-btn" onclick="toggleTheme()">
            Toggle Theme
        </button>

    </div>

    <!-- USER CARD -->

    <div class="card-container">

        <div class="card">

            <img src="https://i.pravatar.cc/150">

            <h2>xyz</h2>

            <p>Java Full Stack Developer</p>

        </div>

    </div>

    <script>

        function toggleTheme(){

            document.getElementById("body")
                    .classList.toggle("dark");

        }

    </script>

</body>

</html>
